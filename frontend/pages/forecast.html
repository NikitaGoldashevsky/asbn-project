<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АСБН - Прогнозирование</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .forecast-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .metric-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .metric-value {
            font-size: 24px;
            font-weight: bold;
            color: #2c5282;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-content">
            <div class="navbar-brand">АСБН | Прогноз</div>
            <div class="navbar-menu" id="user-navbar">
                <a href="monitoring.html">Мониторинг</a>
                <a href="forecast.html">Прогноз</a>
                <a href="balancing.html">Балансировка</a>
                <a href="notifications.html">Уведомления</a>
                <a href="reports.html">Отчёты</a>
                <a href="admin.html" class="admin-only">Админ</a>
                <span id="user-name"></span>
                <a href="#" onclick="logout()">Выход</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-2">
        <div class="card">
            <div class="card-header">📈 Прогноз нагрузки на 24 часа</div>
            
            <div class="forecast-controls">
                <div class="form-group" style="flex: 1;">
                    <label>Выберите узел</label>
                    <select id="node-select" class="form-control">
                        <option value="1">ПС-1 Северная</option>
                        <option value="2">ПС-2 Центральная</option>
                        <option value="3">ПС-3 Южная</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Горизонт прогноза</label>
                    <select id="horizon-select" class="form-control">
                        <option value="24">24 часа</option>
                        <option value="12">12 часов</option>
                        <option value="6">6 часов</option>
                    </select>
                </div>
                <div class="form-group" style="align-self: flex-end;">
                    <button class="btn btn-primary" onclick="loadForecast()">
                        Рассчитать прогноз
                    </button>
                </div>
            </div>
            
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-value" id="mape-value">-</div>
                    <div class="status-label">MAPE (%)</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="max-load">-</div>
                    <div class="status-label">Макс. нагрузка (МВт)</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="avg-load">-</div>
                    <div class="status-label">Сред. нагрузка (МВт)</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="confidence">-</div>
                    <div class="status-label">Доверие (%)</div>
                </div>
            </div>
            
            <canvas id="forecast-chart" height="100"></canvas>
        </div>
        
        <div class="card mt-2">
            <div class="card-header">📊 Метрики качества прогноза</div>
            <table class="table" id="metrics-table">
                <thead>
                    <tr>
                        <th>Метрика</th>
                        <th>Значение</th>
                        <th>Норма</th>
                        <th>Статус</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>MAPE</td>
                        <td id="metrics-mape">-</td>
                        <td>≤ 5%</td>
                        <td><span class="status-norma">✓</span></td>
                    </tr>
                    <tr>
                        <td>RMSE</td>
                        <td id="metrics-rmse">-</td>
                        <td>≤ 3%</td>
                        <td><span class="status-norma">✓</span></td>
                    </tr>
                    <tr>
                        <td>R²</td>
                        <td id="metrics-r2">-</td>
                        <td>≥ 0.95</td>
                        <td><span class="status-norma">✓</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/charts.js"></script>
    <script src="../js/forecast.js"></script>
    <script>
        if (!checkAuth()) window.location.href = '../login.html';
        initNavbar();
        loadForecast();
    </script>
</body>
</html>
