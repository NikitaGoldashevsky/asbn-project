<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АСБН - Мониторинг</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .status-card {
            text-align: center;
            padding: 20px;
        }
        .status-value {
            font-size: 32px;
            font-weight: bold;
            color: #2c5282;
        }
        .status-label {
            color: #718096;
            font-size: 14px;
        }
        .node-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .node-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #48bb78;
        }
        .node-card.warning { border-left-color: #ecc94b; }
        .node-card.overload { border-left-color: #f56565; }
    </style>
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar">
        <div class="container navbar-content">
            <div class="navbar-brand">АСБН | Мониторинг</div>
            <div class="navbar-menu" id="user-navbar">
                <a href="monitoring.html">Мониторинг</a>
                <a href="forecast.html">Прогноз</a>
                <a href="balancing.html">Балансировка</a>
                <a href="notifications.html">Уведомления</a>
                <a href="reports.html">Отчёты</a>
                <a href="admin.html" class="admin-only">Админ</a>
                <span id="user-name"></span>
                <a href="#" onclick="logout()">Выход</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-2">
        <!-- Статус сети -->
        <div class="grid grid-4 mb-2">
            <div class="card status-card">
                <div class="status-value" id="total-nodes">-</div>
                <div class="status-label">Всего узлов</div>
            </div>
            <div class="card status-card">
                <div class="status-value" style="color: #48bb78;" id="norma-nodes">-</div>
                <div class="status-label">Норма</div>
            </div>
            <div class="card status-card">
                <div class="status-value" style="color: #ecc94b;" id="warning-nodes">-</div>
                <div class="status-label">Предупреждение</div>
            </div>
            <div class="card status-card">
                <div class="status-value" style="color: #f56565;" id="overload-nodes">-</div>
                <div class="status-label">Перегрузка</div>
            </div>
        </div>
        
        <!-- Карта нагрузки -->
        <div class="grid grid-2">
            <div class="card">
                <div class="card-header">📊 Карта нагрузки энергосети</div>
                <div id="nodes-container" class="node-grid">
                    <!-- Узлы будут загружены через JS -->
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">⚡ Последние измерения</div>
                <canvas id="measurements-chart"></canvas>
            </div>
        </div>
        
        <!-- Инциденты -->
        <div class="card mt-2">
            <div class="card-header">🚨 Текущие инциденты</div>
            <table class="table" id="incidents-table">
                <thead>
                    <tr>
                        <th>Время</th>
                        <th>Тип</th>
                        <th>Описание</th>
                        <th>Статус</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Инциденты будут загружены через JS -->
                </tbody>
            </table>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/charts.js"></script>
    <script src="../js/monitoring.js"></script>
    <script>
        // Проверка авторизации
        if (!checkAuth()) {
            window.location.href = '../login.html';
        }
        initNavbar();
        loadMonitoringData();
    </script>
</body>
</html>
